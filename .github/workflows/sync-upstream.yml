name: Sync from upstream

on:
  schedule:
    # 每月1日 00:00 执行，有更新就同步
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/VoltAgent/awesome-design-md.git
          git fetch upstream

      - name: Merge upstream/main into main
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push to origin
        run: |
          git push origin main
